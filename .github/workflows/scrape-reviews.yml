name: Scrape Google Reviews

on:
  schedule:
    - cron: '0 19 * * *' # daily 06:00 Melbourne (AEST, UTC+10 in winter)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y >/dev/null
          npm i -D playwright@^1.52.0
          npx playwright install --with-deps chromium

      - name: Run scraper (attempt 1)
        id: scrape1
        continue-on-error: true
        run: node scripts/scrape-google-reviews.mjs

      - name: Run scraper (attempt 2 – retry on first failure)
        id: scrape2
        if: steps.scrape1.outcome == 'failure'
        continue-on-error: true
        run: |
          echo "::warning::First scrape attempt failed — retrying after 30s"
          sleep 30
          node scripts/scrape-google-reviews.mjs

      - name: Upload debug screenshot (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug-screenshot
          path: debug-screenshot.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated reviews.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet reviews.json; then
            git add reviews.json
            git commit -m "chore: refresh Google reviews [skip ci]"
            git push
          else
            echo "No changes to reviews.json."
          fi

      - name: Fail job if both scrape attempts failed
        if: steps.scrape1.outcome == 'failure' && steps.scrape2.outcome == 'failure'
        run: |
          echo "::error::Both scrape attempts failed — Google DOM may have changed or bot detection triggered."
          exit 1
