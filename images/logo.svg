<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 70" role="img" aria-label="Elite Car Tinting">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&display=swap');
      .ect { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; font-size: 48px; }
      .ect-bold { font-weight: 800; letter-spacing: 1.5px; }
      .ect-thin { font-weight: 500; letter-spacing: 4px; }
    ]]></style>
  </defs>
  <text x="0" y="50" class="ect">
    <tspan class="ect-bold">ELITE</tspan><tspan class="ect-thin" dx="14"> CAR TINTING</tspan>
  </text>
</svg>
