<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 80" role="img" aria-label="Elite Car Tinting">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800&display=swap');
      .ect-mark { font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; }
      .ect-strong { font-weight: 800; font-size: 56px; letter-spacing: 2px; }
      .ect-light  { font-weight: 500; font-size: 30px; letter-spacing: 6px; }
    ]]></style>
  </defs>
  <g class="ect-mark">
    <text x="0" y="58" class="ect-strong">ELITE</text>
    <rect x="200" y="18" width="2" height="44" fill="#ffffff" opacity="0.55"/>
    <text x="218" y="52" class="ect-light">CAR TINTING</text>
  </g>
</svg>
